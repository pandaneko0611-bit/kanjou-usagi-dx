<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐰感情うさぎ</title>
<style>
:root{
    --pink:#ff8fb8;
    --light:#fff7fa;
    --glass:rgba(255,255,255,0.75);
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    background:linear-gradient(
        180deg,
        #fff7fa 0%,
        #ffeef5 100%
    );
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    min-height:100vh;
    padding:24px;
    color:#555;
}
.container{
    max-width:500px;
    margin:auto;
}
.card{
    background:var(--glass);
    backdrop-filter:blur(15px);
    border-radius:28px;
    padding:24px;
    margin-bottom:20px;
    box-shadow:
    0 10px 30px rgba(255,143,184,0.15);
}
.rabbit{
    text-align:center;
    font-size:120px;
    animation:float 3s ease-in-out infinite;
}
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}
@keyframes glow{
0%{
box-shadow:0 0 5px #ff8fb8;
}
50%{
box-shadow:0 0 20px #ff8fb8;
}
100%{
box-shadow:0 0 5px #ff8fb8;
}
}

.title{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    color:var(--pink);
    margin-top:10px;
    text-shadow:
    0 0 10px rgba(255,143,184,.4);
}
.subtitle{
    text-align:center;
    color:#999;
    font-size:16px;
    margin-top:8px;
    margin-bottom:12px;
}
.hp{
    text-align:center;
    font-size:42px;
    font-weight:bold;
    color:var(--pink);
    margin-top:10px;
}
.bar-bg{
    background:#ffe1ec;
    height:18px;
    border-radius:999px;
    overflow:hidden;
    margin-top:15px;
}
.bar{
    width:78%;
    height:100%;
    border-radius:999px;
    background:linear-gradient(
    90deg,
    #ffb3cf,
    #ff8fb8
    );
    animation: glow 2s infinite;
    position:relative;
    overflow:hidden;
}
.bar::after{
content:"";
position:absolute;
top:0;
left:-30%;
width:30%;
height:100%;
background:
rgba(255,255,255,.4);
transform:skewX(-20deg);
animation:
shine 3s infinite;
}
@keyframes shine{
0%{
left:-30%;
}
100%{
left:130%;
}
}
.speech{
    background:white;
    border-radius:20px;
    padding:14px;
    margin-top:20px;
    text-align:center;
    position:relative;
}
.speech:after{
    content:"";
    position:absolute;
    left:50%;
    bottom:-10px;
    width:20px;
    height:20px;
    background:white;
    transform:
    translateX(-50%)
    rotate(45deg);
}
.message{
    font-size:18px;
}
.section-title{
    color:var(--pink);
    font-weight:bold;
    margin-bottom:15px;
}
.treasure{
    text-align:center;
    font-size:50px;
}
.progress-text{
    text-align:center;
    margin-top:10px;
}
.collection{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}
.collection-card{
    background:white;
    border-radius:18px;
    padding:12px;
    text-align:center;
}
/* キラキラ背景 */

body::before{
content:””;

position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(
    circle at 20% 20%,
    rgba(255,255,255,.8),
    transparent 15%
),
radial-gradient(
    circle at 80% 30%,
    rgba(255,255,255,.6),
    transparent 12%
),
radial-gradient(
    circle at 60% 80%,
    rgba(255,255,255,.7),
    transparent 10%
);

}

/* 本物の吹き出し */

.speech{
background:white;

border-radius:20px;
padding:18px;
margin-top:20px;
position:relative;
text-align:center;

border:3px solid #ffd2e4;

0 5px 15px rgba(255,143,184,.15);

}

.speech::after{
content:””;

position:absolute;
bottom:-10px;
left:50%;
width:20px;
height:20px;
background:white;
transform:
translateX(-50%)
rotate(45deg);

}

/* 宝箱ゲージ */

.treasure-bar-bg{
background:#ffe3ef;

height:16px;
border-radius:999px;
overflow:hidden;
margin-top:15px;

}

.treasure-bar{
height:100%;

width:70%;
background:
linear-gradient(
90deg,
#ffb3cf,
#ff8fb8
);
border-radius:999px;

}
.diary-box{
    margin-top:20px;
}

#memo{
    width:80%;
    padding:10px;
    border-radius:12px;
    border:none;
}

#diaryList{
    margin-top:20px;
    margin-bottom:50px;
    text-align:left;
}

.diary-card{
    background:white;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
}
    
/* 図鑑カード強化 */

.collection-card{
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:
0 5px 15px rgba(0,0,0,.05);
transition:.3s;
}
.collection-card:active{
transform:scale(.95);
}
}

.collection-card:hover{
transform:translateY(-5px);
}
.collection-card .emoji{
font-size:38px;
margin-bottom:8px;
}
.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-top:20px;
}

.actions button{
border:none;
padding:12px 16px;
border-radius:999px;
background:#ffd6e6;
color:#666;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.actions button:hover{
transform:scale(1.05);
}
@keyframes birthdayGlow{

0%{
transform:scale(1);
filter:drop-shadow(0 0 0px gold);
}

50%{
transform:scale(1.08);
filter:drop-shadow(0 0 18px gold);
}

100%{
transform:scale(1);
filter:drop-shadow(0 0 0px gold);
}

}

.birthday{
animation:birthdayGlow 1.2s infinite;
}
.deleteBtn{

    float:right;
    border:none;
    background:none;
    font-size:22px;
    cursor:pointer;

    transition:
    transform .15s;
}
    .deleteBtn:active{

    transform:
    translateY(-4px)
    scale(.78)
    rotate(-18deg);

}
.albumContent{
    overflow:hidden;
    max-height:0;
    transition:max-height .45s ease;
}

.albumContent.open{
    max-height:1000px;
}
@keyframes shake{

0%{
transform:rotate(0deg);
}

20%{
transform:rotate(-12deg);
}

40%{
transform:rotate(12deg);
}

60%{
transform:rotate(-10deg);
}

80%{
transform:rotate(10deg);
}

100%{
transform:rotate(0deg);
}

}
.modal{

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

background:rgba(0,0,0,.45);

display:none;

justify-content:center;
align-items:center;

z-index:999;

}

.modal.show{

display:flex;

animation:fadeIn .2s;

}

.modalBox{

background:white;

padding:25px;

border-radius:22px;

text-align:center;

width:90%;
max-width:420px;
max-height:80vh;
overflow-y:auto;
box-shadow:0 10px 30px rgba(0,0,0,.2);

}
.modalBox{
    transform:scale(.85);
    opacity:0;
    transition:.25s;
}

.modal.show .modalBox{
    transform:scale(1);
    opacity:1;
}
@keyframes fadeIn{

from{

opacity:0;

}

to{

opacity:1;

}

}
#bookEmoji{

}

#bookTitle{
    color:#ff7eb6;
    margin:10px 0;
}

#bookText{
    white-space:pre-wrap;
}
@keyframes cardPop{

0%{
opacity:0;
transform:translateY(15px) scale(.95);
}

60%{
opacity:1;
transform:translateY(-3px) scale(1.02);
}

100%{
opacity:1;
transform:translateY(0) scale(1);
}

}
#achievementList{
display:flex;
flex-direction:column;
gap:12px;
margin-top:18px;
}

.achievementItem{
background:#fff7fb;
border-radius:16px;
padding:14px;
box-shadow:0 4px 12px rgba(255,170,210,.25);
text-align:left;
}

.achievementTitle{
font-size:18px;
font-weight:bold;
color:#ff7eb6;
margin-bottom:6px;
}

.achievementText{
font-size:14px;
color:#777;
}

.achievementPopup{
position:fixed;
top:-200px;
left:50%;
transform:translateX(-50%);
transition:.5s;
z-index:9999;
}

.achievementPopup.show{
top:30px;
}

.achievementPopupBox{
background:white;
padding:18px 24px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
text-align:center;
min-width:260px;
}

.achievementPopupEmoji{
font-size:40px;
}

.achievementPopupTitle{
font-size:22px;
font-weight:bold;
color:#ff7fb2;
margin-top:6px;
}

.achievementPopupName{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.achievementPopupText{
margin-top:6px;
color:#666;
}

.achievementClear{

background:linear-gradient(
135deg,
#fff8c9,
#ffe9a8
);

border:2px solid #ffd84d;

box-shadow:
0 0 18px rgba(255,210,70,.45);

}

.clearRibbon{

display:inline-block;

background:linear-gradient(
135deg,
#ffd84d,
#ffbf00
);

color:white;

font-size:12px;

font-weight:bold;

padding:4px 10px;

border-radius:999px;

margin-bottom:10px;

box-shadow:
0 2px 8px rgba(255,200,0,.35);

}

.loginStreak{

margin-top:12px;

font-size:18px;

font-weight:bold;

color:#ff7fb2;

background:#fff6fb;

border-radius:999px;

padding:8px 16px;

display:inline-block;

box-shadow:0 3px 10px rgba(255,170,210,.25);

}
</style>
</head>

<script>
//==============================
// 🐰 感情うさぎDX Ver3.3
// 設定
//==============================

const CONFIG = {

    MAX_HP:100,

    TREASURE_MAX:50,

    KING_UNLOCK:100,

    HP_HAPPY:80,

    HP_NORMAL:50,

    HP_TIRED:30,

    MAX_RECENT_DIARY:7

};
//==============================
// 🎁 宝箱報酬
//==============================
const REWARDS = [

"🍈 メロンパン券",

"🐈 猫ちゃんタイム",

"💖 感情うさぎハグ券",

"♨️ 彼温泉入浴券",

"🎀 リボン10個",

"🌟 今日はラッキーデー",

"🍰 ご褒美ケーキ券"

];
//==============================
// 📚 図鑑データ
//==============================

const BOOK_DATA = {

"猫吸いうさぎ":{
    emoji:"🐰🐈",
    text:"猫ちゃん補給で出現。吸うほど元気になる。",
    rare:2
},

"メロンパンうさぎ":{
    emoji:"🐰🍈🍞",
    text:"メロンパンを見ると目が輝く。",
    rare:2
},

"温泉うさぎ":{
    emoji:"🐰♨️",
    text:"彼温泉の常連。のぼせても帰らない。",
    rare:3
},

"宝箱うさぎ":{
    emoji:"🐰🎁",
    text:"宝箱の中に住んでいる。",
    rare:4
},

"VIPうさぎ":{
    emoji:"🐰💎",
    text:"特別室の住人。",
    rare:5
},

"奇跡うさぎ":{
    emoji:"🌈🐰",
    text:"出会えたらラッキー。",
    rare:5
},

"感情うさぎ":{
    emoji:"🐰💓",
    text:"大好きな人には全力💓 感情100%で生きるうさぎ。",
    rare:1
},

"門番うさぎ":{
    emoji:"🐰🚪",
    text:"感情うさぎを守る警備隊長。",
    rare:2
}

};
//==============================
// 🐰 おともだちセリフ
//==============================

const FRIEND_MESSAGES = {

"感情うさぎ":
"💓 今日も一緒に頑張ろ〜！",

"門番うさぎ":
"🚪 今日もちゃんと守るね！",

"猫吸いうさぎ":
"🐈 猫ちゃん補給しよ〜！",

"メロンパンうさぎ":
"🍈🍞 メロンパン買ってきたよ〜！",

"温泉うさぎ":
"♨️ 今日ものんびりしよ〜",

"宝箱うさぎ":
"🎁 宝箱開けるの楽しみ〜！",

"VIPうさぎ":
"💎 特別室へようこそ♪",

"奇跡うさぎ":
"🌈 今日はいいことあるかも！",

"王様うさぎ":
"👑 今日も王国は平和じゃ！",

"お誕生日うさぎ":
"🎂 お祝いしよ〜！！"

};
//========================================
// 🐰 初期化
// ローカルストレージからデータを読み込む
//========================================
let treasure =
parseInt(
localStorage.getItem("treasure")
) || 23;
let savedHP =
localStorage.getItem(
"rabbitHP"
);
if(savedHP){
    document.getElementById("hp")
    .innerText =
    savedHP + "%";
    updateRabbit(
        parseInt(savedHP)
    );
    }
const hpText =
document.getElementById("hp").innerText;
const hp =
parseInt(hpText);
const rabbit =
document.getElementById("rabbit");
if(hp >= CONFIG.HP_HAPPY){
    rabbit.innerHTML = "🐰💖";
}
else if(hp >= CONFIG.HP_NORMAL){
    rabbit.innerHTML = "🐰🎀";
}
else if(hp >= CONFIG.HP_TIRED){
    rabbit.innerHTML = "🐰🥺";
}
else{
    rabbit.innerHTML = "🐰🫠";
}
let loginStreak =
parseInt(localStorage.getItem("loginStreak")) || 0;

let lastLogin =
localStorage.getItem("lastLogin");

const todayDate = new Date();

if(lastLogin){

    const lastDate = new Date(lastLogin);

    const diff =
    Math.floor(
        (todayDate-lastDate)/(1000*60*60*24)
    );

    if(diff==1){

        loginStreak++;

    }else if(diff>1){

        loginStreak=1;

    }

}else{

    loginStreak=1;

}

localStorage.setItem(
    "loginStreak",
    loginStreak
);

localStorage.setItem(
    "lastLogin",
    todayDate.toDateString()
);

document.getElementById("loginStreakText").innerHTML =
"🔥 " + loginStreak + "日連続";

if(loginStreak>=7){
    unlockAchievement("login7");
}

if(loginStreak>=30){
    unlockAchievement("login30");
}

let icon = "🔥";
let title = "会いにきた！";

if(loginStreak >= 100){
    icon = "💎";
    title = "運命共同体";
}
else if(loginStreak >= 30){
    icon = "👑";
    title = "相棒！";
}
else if(loginStreak >= 7){
    icon = "🌈";
    title = "大親友！";
}
else if(loginStreak >= 4){
    icon = "⭐";
    title = "仲良し！";
}

document.getElementById("loginStreakText").innerHTML =
`
<div>${icon} ${title}</div>
<div style="font-size:13px;margin-top:2px;">
${loginStreak}日連続
</div>
`;
//========================================
// ❤️ HPシステム
// HP変更・表情変更
//========================================
function changeHP(amount){

alert("changeHP");

let hpElement =
document.getElementById("hp");
let hp =
parseInt(hpElement.innerText);
hp += amount;
if(hp >= 100){
    unlockAchievement("perfectHP");
}
if(amount > 0){
    unlockAchievement("firstHeal");
}
if(amount > 0 && hp >= CONFIG.HP_HAPPY){

    treasure++;

    document.getElementById(
    "treasure"
    ).innerText = treasure;
    document.getElementById(
"treasureBar"
).style.width =
(treasure / CONFIG.TREASURE_MAX * 100) + "%";
    localStorage.setItem(
    "treasure",
    treasure
    );

    if(treasure >= CONFIG.TREASURE_MAX){
        openTreasure();
    }
}
if(hp > CONFIG.MAX_HP){
    hp = CONFIG.MAX_HP;
}

if(hp < 0){
    hp = 0;
}
hpElement.innerText =
hp + "%";
updateRabbit(hp);
localStorage.setItem(
"rabbitHP",
hp
);
}

function updateRabbit(hp){
    const rabbit =
 document.getElementById("rabbit");

function saveDiary(){

    document.getElementById("hp")

    document.getElementById("memo")
    .value;

    const today =
    new Date()
    .toLocaleDateString();

    const diary =
    {
        date:today,
        hp:hp,
        memo:memo
    };

    let diaries =
    JSON.parse(
        localStorage.getItem(
            "diaries"

    ) || [];

function renderAlbum(){

let diaries =
JSON.parse(
localStorage.getItem("diaries")
)||[];

let groups={};

diaries.forEach(d=>{
    console.log(d);

let month =
d.date.substring(0,7);

if(!groups[month]){

groups[month]=[];

}

groups[month].push(d);

});

let html="";

for(let month in groups){

html+=`
<div
class="diary-card"
onclick="openMonth('${month}')">

▶ ${month}
（${groups[month].length}件）

</div>
`;
}

document.getElementById(
"albumList"
).innerHTML=html;
}
let openedMonth = "";

function openMonth(month){

    const area =
    document.getElementById("albumDetail");

    if(openedMonth===month){

        area.classList.remove("open");

        setTimeout(()=>{
            area.innerHTML="";
        },300);

        openedMonth="";

        return;
    }

    let diaries=
    JSON.parse(
        localStorage.getItem("diaries")
    )||[];

    let html="";

    diaries.forEach(d=>{

        if(d.date.startsWith(month)){

            html+=`
<div class="diary-card">
📅 ${d.date}<br>
❤️ HP ${d.hp}<br>
💬 ${d.memo}
</div>
`;

        }

    });

    area.innerHTML=
    `<div class="albumContent open">${html}</div>`;

    openedMonth=month;

}
